<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(245,166,35,0.04)" stroke-width="1"/>
    </pattern>
    <style>
      text { font-family: 'DM Mono', 'Courier New', monospace; }
      .display { font-family: 'Syne', 'Arial Black', sans-serif; font-weight: 800; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="#0a0a0a"/>
  <rect width="1200" height="750" fill="url(#grid)"/>

  <!-- Header -->
  <rect width="1200" height="60" fill="rgba(10,10,10,0.95)" stroke="#2a2a2a" stroke-width="0" y="0"/>
  <rect width="1200" height="1" fill="#2a2a2a" y="60"/>

  <!-- Brand -->
  <text x="32" y="38" fill="#f5a623" font-size="18" font-family="monospace">◈</text>
  <text x="56" y="39" fill="#e8e8e8" font-size="18" class="display" font-weight="800" letter-spacing="-0.5">VaultPay</text>
  <text x="152" y="34" fill="#555" font-size="10" letter-spacing="2">TUSD ESCROW</text>

  <!-- Wallet info bar -->
  <rect x="750" y="14" width="140" height="32" rx="2" fill="rgba(245,166,35,0.08)" stroke="rgba(245,166,35,0.25)" stroke-width="1"/>
  <text x="765" y="34" fill="#f5a623" font-size="15" font-weight="500">12,500</text>
  <text x="828" y="33" fill="#c47e0d" font-size="10" letter-spacing="1">tUSD</text>

  <rect x="900" y="18" width="110" height="24" rx="2" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="912" y="34" fill="#888" font-size="11">0xf39F…2266</text>

  <!-- Faucet btn -->
  <rect x="1020" y="18" width="68" height="24" rx="2" fill="transparent" stroke="#c47e0d" stroke-width="1"/>
  <text x="1033" y="33" fill="#f5a623" font-size="11">Faucet ↓</text>

  <!-- Approve btn -->
  <rect x="1096" y="18" width="80" height="24" rx="2" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="1108" y="33" fill="#3b82f6" font-size="11">Approve</text>

  <!-- Status bar -->
  <rect width="1200" height="36" y="61" fill="rgba(245,166,35,0.04)"/>
  <rect width="1200" height="1" fill="#2a2a2a" y="97"/>
  <circle cx="32" cy="79" r="4" fill="#f5a623">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="48" y="83" fill="#f5a623" font-size="12">✓ Payment created!</text>

  <!-- Tabs -->
  <rect x="0" y="98" width="1200" height="44" fill="#0a0a0a"/>
  <rect width="1200" height="1" fill="#2a2a2a" y="142"/>
  <text x="32" y="126" fill="#f5a623" font-size="11" letter-spacing="1.5">MY PAYMENTS</text>
  <rect x="32" y="139" width="110" height="2" fill="#f5a623"/>
  <text x="160" y="126" fill="#555" font-size="11" letter-spacing="1.5">NEW PAYMENT</text>
  <text x="290" y="126" fill="#555" font-size="11" letter-spacing="1.5">LOOKUP ID</text>

  <!-- Payment cards grid -->
  <!-- Card 1 - Pending (recipient) -->
  <rect x="32" y="165" width="355" height="230" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="32" y="165" width="3" height="230" rx="0" fill="#f5a623"/>
  <!-- card header -->
  <text x="48" y="190" fill="#555" font-size="10" letter-spacing="1">#3</text>
  <rect x="340" y="176" width="40" height="20" rx="2" fill="rgba(245,166,35,0.12)" stroke="rgba(245,166,35,0.3)" stroke-width="1"/>
  <text x="347" y="190" fill="#f5a623" font-size="9" letter-spacing="1">PENDING</text>
  <!-- amount -->
  <text x="48" y="228" fill="#f5a623" font-size="32" class="display" letter-spacing="-1">250</text>
  <text x="98" y="218" fill="#555" font-size="11" letter-spacing="1">tUSD</text>
  <!-- desc -->
  <rect x="48" y="238" width="323" height="28" rx="2" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="56" y="256" fill="#888" font-size="12" font-style="italic">Invoice #042 — Design work Q2</text>
  <!-- meta -->
  <text x="48" y="286" fill="#555" font-size="10" letter-spacing="0.8">FROM</text>
  <text x="150" y="286" fill="#e8e8e8" font-size="12">0xAB12…cafe</text>
  <text x="48" y="306" fill="#555" font-size="10" letter-spacing="0.8">TO</text>
  <text x="150" y="306" fill="#e8e8e8" font-size="12">0xf39F…2266</text>
  <text x="48" y="326" fill="#555" font-size="10" letter-spacing="0.8">DEADLINE</text>
  <text x="150" y="326" fill="#e8e8e8" font-size="12">Jun 5, 12:00</text>
  <rect x="265" y="316" width="48" height="16" rx="2" fill="rgba(245,166,35,0.1)" stroke="rgba(245,166,35,0.2)" stroke-width="1"/>
  <text x="271" y="328" fill="#f5a623" font-size="9">9d left</text>
  <text x="48" y="346" fill="#555" font-size="10" letter-spacing="0.8">ROLE</text>
  <rect x="150" y="336" width="64" height="16" rx="2" fill="transparent" stroke="#3a3a3a" stroke-width="1"/>
  <text x="157" y="348" fill="#888" font-size="10">Recipient</text>
  <!-- action -->
  <rect x="48" y="360" width="323" height="26" rx="2" fill="#22c55e" stroke="#22c55e" stroke-width="1"/>
  <text x="164" y="377" fill="#000" font-size="12" font-weight="700">Claim Funds</text>

  <!-- Card 2 - Claimed -->
  <rect x="403" y="165" width="355" height="230" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="403" y="165" width="3" height="230" rx="0" fill="#22c55e"/>
  <text x="419" y="190" fill="#555" font-size="10" letter-spacing="1">#1</text>
  <rect x="705" y="176" width="46" height="20" rx="2" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="712" y="190" fill="#22c55e" font-size="9" letter-spacing="1">CLAIMED</text>
  <text x="419" y="228" fill="#f5a623" font-size="32" class="display" letter-spacing="-1">1,000</text>
  <text x="489" y="218" fill="#555" font-size="11" letter-spacing="1">tUSD</text>
  <rect x="419" y="238" width="323" height="28" rx="2" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="427" y="256" fill="#888" font-size="12" font-style="italic">Freelance payment — May batch</text>
  <text x="419" y="286" fill="#555" font-size="10" letter-spacing="0.8">FROM</text>
  <text x="521" y="286" fill="#e8e8e8" font-size="12">0xf39F…2266</text>
  <text x="419" y="306" fill="#555" font-size="10" letter-spacing="0.8">TO</text>
  <text x="521" y="306" fill="#e8e8e8" font-size="12">0x7099…79C8</text>
  <text x="419" y="326" fill="#555" font-size="10" letter-spacing="0.8">DEADLINE</text>
  <text x="521" y="326" fill="#e8e8e8" font-size="12">May 28, 09:00</text>
  <text x="419" y="346" fill="#555" font-size="10" letter-spacing="0.8">ROLE</text>
  <rect x="521" y="336" width="44" height="16" rx="2" fill="transparent" stroke="#3a3a3a" stroke-width="1"/>
  <text x="528" y="348" fill="#888" font-size="10">Payer</text>

  <!-- Card 3 - Pending expired (can cancel) -->
  <rect x="774" y="165" width="355" height="230" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="774" y="165" width="3" height="230" rx="0" fill="#f5a623"/>
  <text x="790" y="190" fill="#555" font-size="10" letter-spacing="1">#2</text>
  <rect x="1076" y="176" width="40" height="20" rx="2" fill="rgba(245,166,35,0.12)" stroke="rgba(245,166,35,0.3)" stroke-width="1"/>
  <text x="1083" y="190" fill="#f5a623" font-size="9" letter-spacing="1">PENDING</text>
  <text x="790" y="228" fill="#f5a623" font-size="32" class="display" letter-spacing="-1">500</text>
  <text x="840" y="218" fill="#555" font-size="11" letter-spacing="1">tUSD</text>
  <rect x="790" y="238" width="323" height="28" rx="2" fill="#181818" stroke="#2a2a2a" stroke-width="1"/>
  <text x="798" y="256" fill="#888" font-size="12" font-style="italic">Milestone 1 — awaiting claim</text>
  <text x="790" y="286" fill="#555" font-size="10" letter-spacing="0.8">FROM</text>
  <text x="892" y="286" fill="#e8e8e8" font-size="12">0xf39F…2266</text>
  <text x="790" y="306" fill="#555" font-size="10" letter-spacing="0.8">TO</text>
  <text x="892" y="306" fill="#e8e8e8" font-size="12">0x3C44…dB85</text>
  <text x="790" y="326" fill="#555" font-size="10" letter-spacing="0.8">DEADLINE</text>
  <text x="892" y="326" fill="#e8e8e8" font-size="12">May 24, 08:00</text>
  <rect x="1008" y="316" width="54" height="16" rx="2" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="1014" y="328" fill="#ef4444" font-size="9">Expired</text>
  <text x="790" y="346" fill="#555" font-size="10" letter-spacing="0.8">ROLE</text>
  <rect x="892" y="336" width="44" height="16" rx="2" fill="transparent" stroke="#3a3a3a" stroke-width="1"/>
  <text x="899" y="348" fill="#888" font-size="10">Payer</text>
  <!-- cancel action -->
  <rect x="790" y="360" width="323" height="26" rx="2" fill="transparent" stroke="#ef4444" stroke-width="1"/>
  <text x="898" y="377" fill="#ef4444" font-size="12">Cancel &amp; Refund</text>

  <!-- Subtitle below cards -->
  <text x="32" y="430" fill="#555" font-size="11" letter-spacing="0.5">3 payments · 1 pending claim · 1 expired · 1 claimed</text>

  <!-- Footer -->
  <rect width="1200" height="40" y="710" fill="#0a0a0a"/>
  <rect width="1200" height="1" y="710" fill="#2a2a2a"/>
  <text x="600" y="732" fill="#444" font-size="11" text-anchor="middle" letter-spacing="1">VaultPay · Hardhat Local · Chain 31337 · No real assets</text>
</svg>
